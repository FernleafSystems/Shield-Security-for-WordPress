name: Browser Tests

concurrency:
  group: browser-tests-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'Playground PHP version'
        required: false
        default: '8.2'
        type: choice
        options:
          - '8.2'
          - '8.3'
          - '8.4'
      wp_version:
        description: 'Playground WordPress version'
        required: false
        default: 'latest'
        type: string
  schedule:
    - cron: '30 6 * * 1-5'

jobs:
  playwright-action-router:
    name: 'Playwright ActionRouter'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SHIELD_PLAYGROUND_PORT: '9400'
      SHIELD_PLAYGROUND_PHP: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.php_version || '8.2' }}
      SHIELD_PLAYGROUND_WP: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.wp_version || 'latest' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '7.4'
        coverage: none
        tools: composer:v2

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.10'
        cache: npm

    - name: Install dependencies
      run: |
        composer install --no-interaction --prefer-dist --optimize-autoloader
        npm ci --no-audit --no-fund

    - name: Build admin assets
      run: npm run build

    - name: Install Playwright Chromium
      run: npx playwright install --with-deps chromium

    - name: Run ActionRouter browser lane
      run: composer test:browser -- --workers=1

    - name: Upload Playwright artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-action-router-artifacts
        path: |
          playwright-report
          test-results
        if-no-files-found: ignore
