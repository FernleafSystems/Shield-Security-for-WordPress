name: Browser Tests

concurrency:
  group: browser-tests-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [ develop, main, master, docker-matrix-testing-research ]
    paths:
      - 'assets/js/**'
      - 'templates/twig/**'
      - 'src/ActionRouter/**'
      - 'tests/browser/**'
      - 'playwright.config.*'
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * 1-5'

jobs:
  playwright-action-router:
    name: 'Playwright ActionRouter'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [ '1/2', '2/2' ]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '7.4'
        coverage: none
        tools: composer:v2

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.10'
        cache: npm

    - name: Install dependencies
      run: |
        composer install --no-interaction --prefer-dist --optimize-autoloader
        npm ci --no-audit --no-fund

    - name: Build admin assets
      run: npm run build

    - name: Install Playwright Chromium
      run: npm run playwright:install -- --with-deps chromium

    - name: Run ActionRouter browser lane
      run: composer test:browser -- --clean -- --shard=${{ matrix.shard }}

    - name: Stop isolated browser test site
      if: always()
      run: php bin/shield test:site:down

    - name: Upload Playwright artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-action-router-artifacts
        path: |
          playwright-report
          test-results
        if-no-files-found: ignore
