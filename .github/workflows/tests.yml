name: Tests

on:
  push:
    branches: [ develop, main, master, docker-matrix-testing-research ]
  pull_request:
    branches: [ develop, main, master, docker-matrix-testing-research ]
  workflow_dispatch:

jobs:
  cache-cleanup-script-tests:
    name: 'Cache Cleanup Script Tests'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Run cache cleanup script regression tests
      run: |
        chmod +x .github/scripts/cleanup-actions-cache.sh
        chmod +x .github/scripts/test-cleanup-actions-cache.sh
        ./.github/scripts/test-cleanup-actions-cache.sh

  admin-bundle-safety-script-tests:
    name: 'Admin Bundle Safety Script Tests'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20.10'

    - name: Run admin bundle safety script regression tests
      run: |
        chmod +x .github/scripts/verify-admin-bundle-safety.sh
        chmod +x .github/scripts/test-verify-admin-bundle-safety.sh
        ./.github/scripts/test-verify-admin-bundle-safety.sh

  js-static:
    name: 'JS Static'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20.10'
        cache: npm

    - name: Install dependencies
      run: npm ci --no-audit --no-fund

    - name: Run JS static checks
      run: npm run test:js

  source-static-analysis:
    name: 'Source Static Analysis'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '7.4'
        coverage: none
        tools: composer:v2

    - name: Install dependencies
      run: composer install --no-interaction --prefer-dist --optimize-autoloader

    - name: Run source static analysis
      run: composer analyze

  unit-php74:
    name: 'Unit PHP 7.4'
    uses: ./.github/workflows/reusable-unit-tests.yml
    with:
      run_command: composer test:unit
      php_version: '7.4'

  unit-latest:
    name: 'Unit Latest PHP'
    uses: ./.github/workflows/reusable-unit-tests.yml
    with:
      run_command: composer test:unit
      php_version: '8.4'

  source-docker-runtime:
    name: 'Source Docker Runtime'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Verify required Docker test scripts are executable
      shell: bash
      run: bash .github/scripts/verify-docker-test-scripts.sh

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        coverage: none
        tools: composer:v2

    - name: Install dependencies
      run: composer install --no-interaction --prefer-dist --optimize-autoloader

    - name: Run source docker runtime checks
      env:
        SHIELD_SOURCE_RUNTIME_LOG_DIR: ${{ runner.temp }}/shield-source-runtime-logs
      run: php bin/shield test:source --skip-unit-tests --show-docker-output

    - name: Upload source docker runtime logs
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: source-docker-runtime-logs
        path: ${{ runner.temp }}/shield-source-runtime-logs
        if-no-files-found: ignore

  build-package:
    name: 'Build Package'
    uses: ./.github/workflows/reusable-build-package.yml
    with:
      artifact_name: shield-package
      package_dir: shield-package

  package-targeted-validation:
    name: 'Package Targeted Validation'
    runs-on: ubuntu-latest
    needs: build-package

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '7.4'
        coverage: none
        tools: composer:v2

    - name: Install dependencies
      run: composer install --no-interaction --prefer-dist --optimize-autoloader

    - name: Load Strauss version
      run: |
        source .github/scripts/read-packager-config.sh
        echo "SHIELD_STRAUSS_VERSION=${SHIELD_STRAUSS_VERSION}" >> $GITHUB_ENV
        echo "SHIELD_STRAUSS_FORK_REPO=${SHIELD_STRAUSS_FORK_REPO:-}" >> $GITHUB_ENV
        echo "SHIELD_STRAUSS_FORK_BRANCH=${SHIELD_STRAUSS_FORK_BRANCH:-}" >> $GITHUB_ENV

    - name: Download package artifact
      uses: actions/download-artifact@v7
      with:
        name: shield-package
        path: ${{ github.workspace }}/shield-package

    - name: Validate downloaded package
      run: |
        PACKAGE_DIR="${{ github.workspace }}/shield-package"
        test -d "$PACKAGE_DIR"
        test -f "$PACKAGE_DIR/icwp-wpsf.php"
        test -f "$PACKAGE_DIR/vendor/autoload.php"
        test -d "$PACKAGE_DIR/vendor_prefixed"
        echo "Downloaded package validation passed"

    - name: Run package-targeted validation
      env:
        SHIELD_PACKAGE_PATH: ${{ github.workspace }}/shield-package
      run: |
        php bin/shield test:package-targeted --package-path="${{ github.workspace }}/shield-package"
